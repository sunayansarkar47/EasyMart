<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choose Account - EasyMart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">

        <!-- Left Side Image (Same as Login Page) -->
        <div class="auth-image">
            <img src="LoginPic.png" alt="Login Image">
            <div class="overlay-text">
                <h2>Join EasyMart</h2>
                <p>Start your journey with us</p>
            </div>
        </div>

        <!-- Right Side Options -->
        <div class="auth-form">

            <h2>Select Your Role</h2>

            <div class="role-options">

                <a href="customer-register.html" class="role-btn">
                    I am a Customer
                </a>

                <a href="shopkeeper-register.html" class="role-btn">
                    I am a Shopkeeper
                </a>

            </div>

            <p class="switch-auth">
                Already have an account? <a href="login.html">Login</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
